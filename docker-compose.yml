services:

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - backend

  app:
    build: ./app
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - backend

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - backend

volumes:
  redis_data:

networks:
  backend:
